<!DOCTYPE html>
<html>
<head>
    <title>Rowspan and Colspan Example</title>
</head>
<body>
    <h2>Student Scores Table</h2>
    <table border="1" cellpadding="10">
        <tr>
            <th rowspan="2">Name</th>
            <th colspan="2">Subjects</th>
            <th rowspan="2">Total</th>
        </tr>
        <tr>
            <th>Math</th>
            <th>Science</th>
        </tr>
        <tr>
            <td>John Doe</td>
            <td>85</td>
            <td>90</td>
            <td>175</td>
        </tr>
        <tr>
            <td>Jane Smith</td>
            <td>92</td>
            <td>88</td>
            <td>180</td>
        </tr>
    </table>
</body>
</html>
